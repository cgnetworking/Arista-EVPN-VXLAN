name: aristaceos
mgmt:
  network: mgmt
  ipv4-subnet: 10.0.1.0/24
topology:
  kinds:
    arista_ceos:
      image: 'ceos:4.34.4M'
    linux:
      image: alpine:latest
      cmd: sh -c "tail -f /dev/null"
  nodes:
    Spine01:
      kind: arista_ceos
      mgmt-ipv4: 10.0.1.10
    Spine02:
      kind: arista_ceos
      mgmt-ipv4: 10.0.1.20
    Leaf01:
      kind: arista_ceos
      mgmt-ipv4: 10.0.1.30
    Leaf02:
      kind: arista_ceos
      mgmt-ipv4: 10.0.1.40
    Leaf03:
      kind: arista_ceos
      mgmt-ipv4: 10.0.1.50
    Leaf04:
      kind: arista_ceos
      mgmt-ipv4: 10.0.1.60
    Host35:
      kind: linux
      exec:
        - ip link set eth1 up
        - ip addr replace 10.10.10.10/24 dev eth1
        - ip route replace default via 10.10.10.1 dev eth1
    Host36:
      kind: linux
      exec:
        - ip link set eth1 up
        - ip addr replace 10.10.20.20/24 dev eth1
        - ip route replace default via 10.10.20.1 dev eth1
  links:
    - endpoints:
        - 'Spine01:eth1'
        - 'Leaf01:eth1'
    - endpoints:
        - 'Spine01:eth2'
        - 'Leaf02:eth1'
    - endpoints:
        - 'Spine01:eth3'
        - 'Leaf03:eth1'
    - endpoints:
        - 'Spine01:eth4'
        - 'Leaf04:eth1'
    - endpoints:
        - 'Spine02:eth1'
        - 'Leaf01:eth2'
    - endpoints:
        - 'Spine02:eth2'
        - 'Leaf02:eth2'
    - endpoints:
        - 'Spine02:eth3'
        - 'Leaf03:eth2'
    - endpoints:
        - 'Spine02:eth4'
        - 'Leaf04:eth2'
    - endpoints:
        - 'Leaf01:eth3'
        - 'Host35:eth1'
    - endpoints:
        - 'Leaf02:eth3'
        - 'Host36:eth1'
