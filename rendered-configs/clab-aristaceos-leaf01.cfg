! Rendered from playbook.yml
service routing protocols model multi-agent
ip routing
aaa authorization exec default local
ip virtual-router mac-address 02:00:00:00:10:01
username cg privilege 15 nopassword
username cg ssh-key ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIg7CYAc3w8/tJ4HoYzp1FkwuUNNc55fsUq/8BqGq7cE Arista
!
vrf instance TENANT-1
!
vrf instance TENANT-2
!
ip routing vrf TENANT-1
ip routing vrf TENANT-2
!
vlan 10
!
vlan 20
!
vlan 30
!
interface Loopback0
   ip address 192.168.1.11/32
!
interface Loopback1
   ip address 192.168.255.11/32
!
interface Ethernet1
   description clab-aristaceos-leaf01-to-clab-aristaceos-spine01
   no switchport
   ip address 10.0.0.0/31
!
interface Ethernet2
   description clab-aristaceos-leaf01-to-clab-aristaceos-spine02
   no switchport
   ip address 10.0.0.2/31
!
interface Vlan10
   vrf TENANT-1
   ip address virtual 10.10.10.1/24
!
interface Vlan20
   vrf TENANT-1
   ip address virtual 10.10.20.1/24
!
interface Vlan30
   vrf TENANT-2
   ip address virtual 10.10.30.1/24
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan learn-restrict any
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vlan 30 vni 10030
   vxlan vrf TENANT-1 vni 90001
   vxlan vrf TENANT-2 vni 90002
!
router bgp 65011
   no bgp default ipv4-unicast
   maximum-paths 2 ecmp 2
   bgp log-neighbor-changes
   distance bgp 20 200 200
   network 192.168.1.11/32
   network 192.168.255.11/32
   router-id 192.168.1.11
   rd auto
   neighbor UNDERLAY peer group
   neighbor UNDERLAY remote-as 65010
   neighbor 10.0.0.1 peer group UNDERLAY
   neighbor 10.0.0.3 peer group UNDERLAY
   neighbor EVPN peer group
   neighbor EVPN remote-as 65010
   neighbor EVPN update-source Loopback0
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN send-community extended
   neighbor 192.168.1.1 peer group EVPN
   neighbor 192.168.1.2 peer group EVPN
   !
   address-family ipv4
      neighbor UNDERLAY activate
   !
   address-family evpn
      neighbor EVPN activate
   !
   vlan 10
      rd auto
      route-target both 10:10010
      redistribute connected
   !
   vlan 20
      rd auto
      route-target both 20:10020
      redistribute connected
   !
   vlan 30
      rd auto
      route-target both 30:10030
      redistribute connected
   !
   vrf TENANT-1
      rd 192.168.1.11:1
      route-target import evpn 1:90001
      route-target export evpn 1:90001
      redistribute connected
      !
      address-family ipv4
         route-target import evpn 1:90001
         route-target export evpn 1:90001
   !
   vrf TENANT-2
      rd 192.168.1.11:2
      route-target import evpn 2:90002
      route-target export evpn 2:90002
      redistribute connected
      !
      address-family ipv4
         route-target import evpn 2:90002
         route-target export evpn 2:90002
