! Rendered from playbook.yml
service routing protocols model multi-agent
ip routing
aaa authorization exec default local
username cg privilege 15 nopassword
username cg ssh-key ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIg7CYAc3w8/tJ4HoYzp1FkwuUNNc55fsUq/8BqGq7cE Arista
!
interface Loopback0
   ip address 192.168.1.1/32
!
interface Ethernet1
   description clab-aristaceos-spine01-to-clab-aristaceos-leaf01
   no switchport
   ip address 10.0.0.1/31
!
interface Ethernet2
   description clab-aristaceos-spine01-to-clab-aristaceos-leaf02
   no switchport
   ip address 10.0.0.5/31
!
interface Ethernet3
   description clab-aristaceos-spine01-to-clab-aristaceos-leaf03
   no switchport
   ip address 10.0.0.9/31
!
interface Ethernet4
   description clab-aristaceos-spine01-to-clab-aristaceos-leaf04
   no switchport
   ip address 10.0.0.13/31
!
router bgp 65010
   no bgp default ipv4-unicast
   maximum-paths 4 ecmp 64
   bgp log-neighbor-changes
   distance bgp 20 200 200
   network 192.168.1.1/32
   router-id 192.168.1.1
   neighbor evpn next-hop-unchanged
   neighbor 10.0.0.0 remote-as 65011
   neighbor 10.0.0.4 remote-as 65012
   neighbor 10.0.0.8 remote-as 65013
   neighbor 10.0.0.12 remote-as 65014
   neighbor EVPN peer group
   neighbor EVPN update-source Loopback0
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN send-community extended
   neighbor 192.168.1.11 peer group EVPN
   neighbor 192.168.1.11 remote-as 65011
   neighbor 192.168.1.12 peer group EVPN
   neighbor 192.168.1.12 remote-as 65012
   neighbor 192.168.1.13 peer group EVPN
   neighbor 192.168.1.13 remote-as 65013
   neighbor 192.168.1.14 peer group EVPN
   neighbor 192.168.1.14 remote-as 65014
   !
   address-family ipv4
      neighbor 10.0.0.0 activate
      neighbor 10.0.0.4 activate
      neighbor 10.0.0.8 activate
      neighbor 10.0.0.12 activate
   !
   address-family evpn
      neighbor EVPN activate
