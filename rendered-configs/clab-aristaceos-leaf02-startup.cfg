service routing protocols model multi-agent
ip routing
aaa authorization exec default local

interface Loopback0
   ip address 192.168.1.12/32

interface Ethernet1
   description clab-aristaceos-leaf02-to-clab-aristaceos-spine01
   no switchport
   ip address 10.0.0.4/31

interface Ethernet2
   description clab-aristaceos-leaf02-to-clab-aristaceos-spine02
   no switchport
   ip address 10.0.0.6/31

interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020

vlan 10
vlan 20

router bgp 65012
   no bgp default ipv4-unicast
   router-id 192.168.1.12
   neighbor 10.0.0.5 remote-as 65010
   neighbor 10.0.0.7 remote-as 65010
   neighbor EVPN peer group
   neighbor EVPN remote-as 65010
   neighbor EVPN update-source Loopback0
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN send-community extended
   neighbor 192.168.1.1 peer group EVPN
   neighbor 192.168.1.2 peer group EVPN
   network 192.168.1.12/32
   maximum-paths 4 ecmp 4
   !
   vlan 10
      rd auto
      route-target import auto 65012
      route-target export auto 65012
      redistribute learned
   vlan 20
      rd auto
      route-target import auto 65012
      route-target export auto 65012
      redistribute learned
   !
   address-family ipv4
      neighbor 10.0.0.5 activate
      neighbor 10.0.0.7 activate
   !
   address-family evpn
      neighbor EVPN activate
      advertise-all-vni
