service routing protocols model multi-agent
ip routing
aaa authorization exec default local

interface Loopback0
   ip address 192.168.1.13/32

interface Ethernet1
   description clab-aristaceos-leaf03-to-clab-aristaceos-spine01
   no switchport
   ip address 10.0.0.8/31

interface Ethernet2
   description clab-aristaceos-leaf03-to-clab-aristaceos-spine02
   no switchport
   ip address 10.0.0.10/31

interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020

vlan 10
vlan 20

router bgp 65013
   no bgp default ipv4-unicast
   router-id 192.168.1.13
   neighbor 10.0.0.9 remote-as 65010
   neighbor 10.0.0.11 remote-as 65010
   neighbor EVPN peer group
   neighbor EVPN remote-as 65010
   neighbor EVPN update-source Loopback0
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN send-community extended
   neighbor 192.168.1.1 peer group EVPN
   neighbor 192.168.1.2 peer group EVPN
   network 192.168.1.13/32
   maximum-paths 4 ecmp 4
   !
   vlan 10
      rd auto
      route-target import auto 65013
      route-target export auto 65013
   vlan 20
      rd auto
      route-target import auto 65013
      route-target export auto 65013
   !
   address-family ipv4
      neighbor 10.0.0.9 activate
      neighbor 10.0.0.11 activate
   !
   address-family evpn
      neighbor EVPN activate
