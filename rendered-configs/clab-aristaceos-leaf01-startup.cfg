service routing protocols model multi-agent
ip routing
aaa authorization exec default local
ip virtual-router mac-address 02:00:00:00:10:01

vrf instance TENANT-10
vrf instance TENANT-20

ip routing vrf TENANT-10
ip routing vrf TENANT-20

interface Loopback0
   ip address 192.168.1.11/32

interface Ethernet1
   description clab-aristaceos-leaf01-to-clab-aristaceos-spine01
   no switchport
   ip address 10.0.0.0/31

interface Ethernet2
   description clab-aristaceos-leaf01-to-clab-aristaceos-spine02
   no switchport
   ip address 10.0.0.2/31

interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vrf TENANT-10 vni 90010
   vxlan vrf TENANT-20 vni 90020

interface Vlan10
   vrf TENANT-10
   ip address virtual 10.10.10.1/24

interface Vlan20
   vrf TENANT-20
   ip address virtual 10.10.20.1/24

vlan 10
vlan 20

router bgp 65011
   no bgp default ipv4-unicast
   router-id 192.168.1.11
   neighbor 10.0.0.1 remote-as 65010
   neighbor 10.0.0.3 remote-as 65010
   neighbor EVPN peer group
   neighbor EVPN remote-as 65010
   neighbor EVPN update-source Loopback0
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN send-community extended
   neighbor 192.168.1.1 peer group EVPN
   neighbor 192.168.1.2 peer group EVPN
   network 192.168.1.11/32
   maximum-paths 4 ecmp 4
   !
   vlan 10
      rd auto
      route-target import auto 65011
      route-target export auto 65011
      redistribute learned
   vlan 20
      rd auto
      route-target import auto 65011
      route-target export auto 65011
      redistribute learned
   !
   vrf TENANT-10
      rd auto
      route-target import evpn 90010:90010
      route-target export evpn 90010:90010
      redistribute connected
   vrf TENANT-20
      rd auto
      route-target import evpn 90020:90020
      route-target export evpn 90020:90020
      redistribute connected
   !
   address-family ipv4
      neighbor 10.0.0.1 activate
      neighbor 10.0.0.3 activate
   !
   address-family evpn
      neighbor EVPN activate
      advertise-all-vni
      advertise-svi-ip
