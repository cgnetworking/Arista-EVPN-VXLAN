service routing protocols model multi-agent
ip routing
aaa authorization exec default local

interface Loopback0
   ip address 192.168.1.2/32

interface Ethernet1
   description clab-aristaceos-spine02-to-clab-aristaceos-leaf01
   no switchport
   ip address 10.0.0.3/31

interface Ethernet2
   description clab-aristaceos-spine02-to-clab-aristaceos-leaf02
   no switchport
   ip address 10.0.0.7/31

interface Ethernet3
   description clab-aristaceos-spine02-to-clab-aristaceos-leaf03
   no switchport
   ip address 10.0.0.11/31

interface Ethernet4
   description clab-aristaceos-spine02-to-clab-aristaceos-leaf04
   no switchport
   ip address 10.0.0.15/31

router bgp 65010
   no bgp default ipv4-unicast
   router-id 192.168.1.2
   neighbor 10.0.0.2 remote-as 65011
   neighbor 10.0.0.6 remote-as 65012
   neighbor 10.0.0.10 remote-as 65013
   neighbor 10.0.0.14 remote-as 65014
   neighbor EVPN peer group
   neighbor EVPN update-source Loopback0
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN send-community extended
   neighbor 192.168.1.11 peer group EVPN
   neighbor 192.168.1.11 remote-as 65011
   neighbor 192.168.1.12 peer group EVPN
   neighbor 192.168.1.12 remote-as 65012
   neighbor 192.168.1.13 peer group EVPN
   neighbor 192.168.1.13 remote-as 65013
   neighbor 192.168.1.14 peer group EVPN
   neighbor 192.168.1.14 remote-as 65014
   network 192.168.1.2/32
   address-family ipv4
      neighbor 10.0.0.2 activate
      neighbor 10.0.0.6 activate
      neighbor 10.0.0.10 activate
      neighbor 10.0.0.14 activate
   address-family evpn
      neighbor EVPN activate
