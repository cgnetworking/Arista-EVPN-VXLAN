---
# =========================
# LEAF CONFIGURATION
# =========================
- name: Configure leafs (VXLAN EVPN)
  hosts: leafs
  gather_facts: false

  vars:
    loopback: "{{ loopback_base }}.{{ id }}"
    spine_asn: "{{ hostvars[groups['spines'][0]].asn }}"

  tasks:

    - name: Enable routing
      eos_config:
        lines:
          - service routing protocols model multi-agent
          - ip routing
          - aaa authorization exec default local
          - ip virtual-router mac-address 02:00:00:00:10:01

    - name: Configure Loopback
      eos_config:
        lines:
          - ip address {{ loopback }}/32
        parents: interface Loopback0

    - name: Configure VRFs
      eos_config:
        lines:
          - vrf instance {{ item.vrf }}
      loop: "{{ vlans }}"

    - name: Enable VRF routing
      eos_config:
        lines:
          - ip routing vrf {{ item.vrf }}
      loop: "{{ vlans }}"

    # -------------------
    # Underlay Interfaces (Link Map)
    # -------------------
    - name: Configure leaf underlay interfaces
      eos_config:
        lines:
          - description {{ item.leaf }}-to-{{ item.spine }}
          - no switchport
          - ip address {{ item.leaf_ip }}
        parents: "interface {{ item.leaf_intf }}"
      loop: "{{ links }}"
      when: item.leaf == inventory_hostname

    # -------------------
    # Underlay BGP
    # -------------------
    - name: Configure BGP underlay for leafs
      eos_config:
        lines: |
          no bgp default ipv4-unicast
          {% for link in links if link.leaf == inventory_hostname %}
          neighbor {{ link.spine_ip.split('/')[0] }} remote-as {{ spine_asn }}
          {% endfor %}
          network {{ loopback }}/32
        parents: router bgp {{ asn }}

    - name: Activate leaf underlay neighbors for IPv4
      eos_config:
        lines: |
          {% for link in links if link.leaf == inventory_hostname %}
          neighbor {{ link.spine_ip.split('/')[0] }} activate
          {% endfor %}
        parents:
          - router bgp {{ asn }}
          - address-family ipv4

    # -------------------
    # EVPN Overlay
    # -------------------
    - name: Configure EVPN base
      eos_config:
        lines:
          - router-id {{ loopback }}
          - rd auto
        parents: router bgp {{ asn }}

    - name: Configure EVPN neighbors (leaf -> spines only)
      eos_config:
        lines: |
          neighbor EVPN peer group
          maximum-paths 4 ecmp 4
          neighbor EVPN remote-as {{ spine_asn }}
          neighbor EVPN update-source Loopback0
          neighbor EVPN ebgp-multihop 3
          neighbor EVPN send-community extended
          {% for spine in groups['spines'] %}
          neighbor {{ loopback_base }}.{{ hostvars[spine].id }} peer group EVPN
          {% endfor %}
        parents: router bgp {{ asn }}

    - name: Activate leaf EVPN neighbors
      eos_config:
        lines:
          - neighbor EVPN activate
        parents:
          - router bgp {{ asn }}
          - address-family evpn

    # -------------------
    # VLANs / VXLAN
    # -------------------
    - name: Configure VLANs
      eos_config:
        lines: |
          {% for vlan in vlans %}
          vlan {{ vlan.id }}
          {% endfor %}

    - name: Configure VLAN gateways
      eos_config:
        lines:
          - vrf {{ item.vrf }}
          - ip address virtual {{ item.gateway }}
        parents: interface Vlan{{ item.id }}
      loop: "{{ vlans }}"

    - name: Configure VXLAN interface
      eos_config:
        lines:
          - vxlan source-interface Loopback0
          - vxlan udp-port 4789
        parents: interface Vxlan1

    - name: Map VNIs
      eos_config:
        lines: |
          {% for vlan in vlans %}
          vxlan vlan {{ vlan.id }} vni {{ vlan.vni }}
          {% endfor %}
        parents: interface Vxlan1

    - name: Map L3 VNIs
      eos_config:
        lines:
          - vxlan vrf {{ item.vrf }} vni {{ item.l3_vni }}
        parents: interface Vxlan1
      loop: "{{ vlans }}"

    - name: Enable EVPN VLANs
      eos_config:
        lines:
          - rd auto
          - route-target import auto {{ evpn_route_target_asn }}
          - route-target export auto {{ evpn_route_target_asn }}
          - redistribute learned
        parents:
          - router bgp {{ asn }}
          - vlan {{ item.id }}
      loop: "{{ vlans }}"

    - name: Configure EVPN VRF base
      eos_config:
        lines:
          - redistribute connected
        parents:
          - router bgp {{ asn }}
          - vrf {{ item.vrf }}
      loop: "{{ vlans }}"

    - name: Configure EVPN VRF IPv4 route-targets
      eos_config:
        lines:
          - route-target import evpn {{ asn }}:{{ item.l3_vni }}
          - route-target export evpn {{ asn }}:{{ item.l3_vni }}
        parents:
          - router bgp {{ asn }}
          - vrf {{ item.vrf }}
          - address-family ipv4
      loop: "{{ vlans }}"


# =========================
# SPINE CONFIGURATION
# =========================
- name: Configure spines (VXLAN EVPN)
  hosts: spines
  gather_facts: no

  vars:
    loopback: "{{ loopback_base }}.{{ id }}"

  tasks:

    - name: Enable routing
      eos_config:
        lines:
          - service routing protocols model multi-agent
          - ip routing
          - aaa authorization exec default local

    - name: Configure Loopback
      eos_config:
        lines:
          - ip address {{ loopback }}/32
        parents: interface Loopback0

    # -------------------
    # Underlay Interfaces (Link Map)
    # -------------------
    - name: Configure spine underlay interfaces
      eos_config:
        lines:
          - description {{ item.spine }}-to-{{ item.leaf }}
          - no switchport
          - ip address {{ item.spine_ip }}
        parents: "interface {{ item.spine_intf }}"
      loop: "{{ links }}"
      when: item.spine == inventory_hostname

    # -------------------
    # Underlay BGP
    # -------------------
    - name: Configure BGP underlay for spines
      eos_config:
        lines: |
          no bgp default ipv4-unicast
          {% for link in links if link.spine == inventory_hostname %}
          neighbor {{ link.leaf_ip.split('/')[0] }} remote-as {{ hostvars[link.leaf].asn }}
          {% endfor %}
          network {{ loopback }}/32
        parents: router bgp {{ asn }}

    - name: Activate spine underlay neighbors for IPv4
      eos_config:
        lines: |
          {% for link in links if link.spine == inventory_hostname %}
          neighbor {{ link.leaf_ip.split('/')[0] }} activate
          {% endfor %}
        parents:
          - router bgp {{ asn }}
          - address-family ipv4

    # -------------------
    # EVPN Overlay
    # -------------------
    - name: Configure EVPN base
      eos_config:
        lines:
          - router-id {{ loopback }}
        parents: router bgp {{ asn }}

    - name: Configure EVPN neighbors (spines -> leafs only)
      eos_config:
        lines: |
          neighbor EVPN peer group
          neighbor EVPN update-source Loopback0
          neighbor EVPN ebgp-multihop 3
          neighbor EVPN send-community extended
          {% for leaf in groups['leafs'] %}
          neighbor {{ loopback_base }}.{{ hostvars[leaf].id }} peer group EVPN
          neighbor {{ loopback_base }}.{{ hostvars[leaf].id }} remote-as {{ hostvars[leaf].asn }}
          {% endfor %}
        parents: router bgp {{ asn }}

    - name: Activate spine EVPN neighbors
      eos_config:
        lines:
          - neighbor EVPN activate
        parents:
          - router bgp {{ asn }}
          - address-family evpn
