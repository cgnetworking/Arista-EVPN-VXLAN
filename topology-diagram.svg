  <text x="430" y="435" text-anchor="middle" class="nodeName">Spine01</text>
  <text x="430" y="465" text-anchor="middle" class="nodeMeta">host: clab-aristaceos-spine01</text>
  <text x="430" y="493" text-anchor="middle" class="nodeMeta">mgmt: 10.0.1.10</text>
