  <text x="270" y="891" text-anchor="middle" class="nodeMeta">Loopback0: 192.168.1.11/32</text>
  <text x="270" y="919" text-anchor="middle" class="nodeMeta">ASN: 65020</text>

  <rect x="500" y="760" width="380" height="220" class="leaf" />
