  <text x="690" y="835" text-anchor="middle" class="nodeMeta">host: clab-aristaceos-leaf02</text>
  <text x="690" y="863" text-anchor="middle" class="nodeMeta">mgmt: 10.0.1.40</text>
  <text x="690" y="891" text-anchor="middle" class="nodeMeta">Loopback0: 192.168.1.12/32</text>
  <text x="690" y="919" text-anchor="middle" class="nodeMeta">ASN: 65020</text>

  <rect x="920" y="760" width="380" height="220" class="leaf" />
  <text x="1110" y="805" text-anchor="middle" class="nodeName">Leaf03</text>
  <text x="1110" y="835" text-anchor="middle" class="nodeMeta">host: clab-aristaceos-leaf03</text>
  <text x="1110" y="863" text-anchor="middle" class="nodeMeta">mgmt: 10.0.1.50</text>
  <text x="1110" y="891" text-anchor="middle" class="nodeMeta">Loopback0: 192.168.1.13/32</text>
  <text x="1110" y="919" text-anchor="middle" class="nodeMeta">ASN: 65020</text>

  <rect x="1340" y="760" width="380" height="220" class="leaf" />
  <text x="1530" y="805" text-anchor="middle" class="nodeName">Leaf04</text>
  <text x="1530" y="835" text-anchor="middle" class="nodeMeta">host: clab-aristaceos-leaf04</text>
  <text x="1530" y="863" text-anchor="middle" class="nodeMeta">mgmt: 10.0.1.60</text>
  <text x="1530" y="891" text-anchor="middle" class="nodeMeta">Loopback0: 192.168.1.14/32</text>
  <text x="1530" y="919" text-anchor="middle" class="nodeMeta">ASN: 65020</text>

  <rect x="60" y="1005" width="660" height="60" class="panel" />
  <line x1="95" y1="1035" x2="165" y2="1035" class="link legendLine" />
  <text x="180" y="1041" class="small">Physical underlay routed link</text>
  <line x1="405" y1="1035" x2="475" y2="1035" class="overlay legendLine" />
  <text x="490" y="1041" class="small">EVPN overlay via Loopback0</text>

