<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1600" viewBox="0 0 2400 1600" role="img" aria-labelledby="title desc">
  <title id="title">Arista cEOS VXLAN EVPN topology from Ansible playbook</title>
  <desc id="desc">Two spines and four leaves with routed /31 underlay links, eBGP EVPN overlay sessions over Loopback0, VTEP Loopback1 addresses on leaves, and VLAN to VNI mappings.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 3; rx: 26; }
      .spineGroup { fill: #eff6ff; stroke: #93c5fd; stroke-width: 3; rx: 26; }
      .leafGroup { fill: #f0fdf4; stroke: #86efac; stroke-width: 3; rx: 26; }
      .panel { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
      .legend { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .spine { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; rx: 18; }
      .leaf { fill: #dcfce7; stroke: #16a34a; stroke-width: 4; rx: 18; }
      .tenant1Fill { fill: #dbeafe; }
      .tenant2Fill { fill: #fce7f3; }
      .tenant1Stroke { stroke: #2563eb; }
      .tenant2Stroke { stroke: #db2777; }
      .title { font: 700 40px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px Arial, sans-serif; fill: #475569; }
      .section { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .nodeName { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .nodeMeta { font: 500 19px Arial, sans-serif; fill: #334155; }
      .small { font: 500 18px Arial, sans-serif; fill: #334155; }
      .bold { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .link { stroke: #64748b; stroke-width: 4; }
      .overlay { stroke: #6d28d9; stroke-width: 6; stroke-dasharray: 18 10; stroke-linecap: round; fill: none; }
      .endpointText { font: 600 14px Arial, sans-serif; fill: #1f2937; }
      .port { fill: #475569; stroke: #ffffff; stroke-width: 2; }
      .legendLine { stroke-width: 4; }
      .tableHead { font: 700 19px Arial, sans-serif; fill: #7c2d12; }
      .tableCell { font: 500 18px Arial, sans-serif; fill: #431407; }
      .tenantTag { font: 700 16px Arial, sans-serif; }
      .tenant1Text { fill: #1d4ed8; }
      .tenant2Text { fill: #be185d; }
    </style>
  </defs>

  <rect x="0" y="0" width="2400" height="1600" class="bg" />
  <rect x="30" y="30" width="2340" height="1540" class="frame" />

  <text x="1200" y="88" text-anchor="middle" class="title">Arista cEOS VXLAN / EVPN Fabric</text>
  <text x="1200" y="126" text-anchor="middle" class="subtitle">Rendered from playbook.yml, inventory.yml, and group_vars/all.yml</text>
  <text x="1200" y="170" text-anchor="middle" class="bold">EVPN overlay peering via Loopback0</text>
  <text x="1200" y="200" text-anchor="middle" class="small">Spines peer with all leaves. Leaves peer with both spines. eBGP multihop 3, update-source Loopback0.</text>

