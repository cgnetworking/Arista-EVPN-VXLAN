  <text x="430" y="549" text-anchor="middle" class="nodeMeta">ASN: 65010</text>

  <rect x="1190" y="390" width="360" height="200" class="spine" />
  <text x="1370" y="435" text-anchor="middle" class="nodeName">Spine02</text>
  <text x="1370" y="465" text-anchor="middle" class="nodeMeta">host: clab-aristaceos-spine02</text>
  <text x="1370" y="493" text-anchor="middle" class="nodeMeta">mgmt: 10.0.1.20</text>
