<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Arista cEOS VXLAN EVPN topology with Ansible configuration details</title>
  <desc id="desc">Two spines and four leaves with underlay /31 links, eBGP underlay, EVPN overlay, loopbacks, and VLAN to VNI mappings.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 3; rx: 26; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 20; }
      .spineGroup { fill: #eff6ff; stroke: #93c5fd; stroke-width: 3; rx: 26; }
      .leafGroup { fill: #f0fdf4; stroke: #86efac; stroke-width: 3; rx: 26; }
      .spine { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; rx: 18; }
      .leaf { fill: #dcfce7; stroke: #16a34a; stroke-width: 4; rx: 18; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 19px Arial, sans-serif; fill: #475569; }
      .section { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .nodeName { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .nodeMeta { font: 500 17px Arial, sans-serif; fill: #334155; }
      .small { font: 500 16px Arial, sans-serif; fill: #334155; }
      .bold { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .link { stroke: #64748b; stroke-width: 4; }
      .overlay { stroke: #6d28d9; stroke-width: 6; stroke-dasharray: 18 10; stroke-linecap: round; fill: none; }
      .linkText { font: 600 15px Arial, sans-serif; fill: #1f2937; }
      .legendLine { stroke-width: 4; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" class="bg" />
  <rect x="30" y="30" width="1740" height="1060" class="frame" />
  <rect x="220" y="360" width="1360" height="260" class="spineGroup" />
  <rect x="50" y="730" width="1700" height="280" class="leafGroup" />

  <text x="900" y="82" text-anchor="middle" class="title">Arista cEOS VXLAN / EVPN Fabric</text>
  <text x="900" y="116" text-anchor="middle" class="subtitle">Physical topology from topology.clab.yml, control-plane and service details from Playbook.yml, Inventory.yml, and group_vars/all.yml</text>


  <line x1="430" y1="520" x2="270" y2="760" class="link" />
  <line x1="430" y1="520" x2="690" y2="760" class="link" />
  <line x1="430" y1="520" x2="1110" y2="760" class="link" />
  <line x1="430" y1="520" x2="1530" y2="760" class="link" />

  <line x1="1370" y1="520" x2="270" y2="760" class="link" />
  <line x1="1370" y1="520" x2="690" y2="760" class="link" />
  <line x1="1370" y1="520" x2="1110" y2="760" class="link" />
  <line x1="1370" y1="520" x2="1530" y2="760" class="link" />

  <path d="M 430 520 C 620 390, 1180 390, 1370 520" class="overlay" />
  <path d="M 270 870 C 680 870, 1120 870, 1530 870" class="overlay" />

  <text x="900" y="412" text-anchor="middle" class="bold">EVPN overlay peering via</text>
  <text x="900" y="436" text-anchor="middle" class="bold">Loopback0 addresses</text>
  <text x="900" y="462" text-anchor="middle" class="small">Spines peer with all leaves; leaves peer with both spines</text>

  <text x="270" y="630" text-anchor="middle" class="linkText">Eth1 / 10.0.0.1/31</text>
  <text x="270" y="650" text-anchor="middle" class="linkText">Eth1 / 10.0.0.0/31</text>

  <text x="540" y="630" text-anchor="middle" class="linkText">Eth2 / 10.0.0.5/31</text>
