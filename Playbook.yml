---
# =========================
# LEAF CONFIGURATION
# =========================
- name: Configure leafs (VXLAN EVPN)
  hosts: leafs
  gather_facts: no

  vars:
    loopback: "{{ loopback_base }}.{{ id }}"

  tasks:

    - name: Enable routing
      eos_config:
        lines:
          - service routing protocols model multi-agent
          - ip routing

    - name: Configure Loopback
      eos_config:
        lines:
          - ip address {{ loopback }}/32
        parents: interface Loopback0

    # -------------------
    # Underlay Interfaces (Link Map)
    # -------------------
    - name: Configure leaf underlay interfaces
      eos_config:
        lines: |
          {% for link in links if link.leaf == inventory_hostname %}
          interface {{ link.leaf_intf }}
            description {{ link.leaf }}-to-{{ link.spine }}
            no switchport
            ip address {{ link.leaf_ip }}
          {% endfor %}

    # -------------------
    # Underlay BGP
    # -------------------
    - name: Configure BGP underlay for leafs
      eos_config:
        lines: |
          no bgp default ipv4-unicast
          {% for link in links if link.leaf == inventory_hostname %}
          neighbor {{ link.spine_ip.split('/')[0] }} remote-as {{ hostvars[link.spine].asn }}
          {% endfor %}
          network {{ loopback }}/32
        parents: router bgp {{ asn }}

    - name: Activate leaf underlay neighbors for IPv4
      eos_config:
        lines: |
          {% for link in links if link.leaf == inventory_hostname %}
          neighbor {{ link.spine_ip.split('/')[0] }} activate
          {% endfor %}
        parents:
          - router bgp {{ asn }}
          - address-family ipv4

    # -------------------
    # EVPN Overlay
    # -------------------
    - name: Configure EVPN base
      eos_config:
        lines:
          - router-id {{ loopback }}
        parents: router bgp {{ asn }}

    - name: Ensure EVPN address-family exists on leafs
      eos_config:
        lines: []
        parents:
          - router bgp {{ asn }}
          - address-family evpn

    - name: Configure EVPN neighbors (leaf -> spines only)
      eos_config:
        lines: |
          neighbor EVPN peer group
          neighbor EVPN update-source Loopback0
          neighbor EVPN ebgp-multihop 3
          neighbor EVPN send-community extended
          {% for spine in groups['spines'] %}
          neighbor {{ loopback_base }}.{{ hostvars[spine].id }} peer group EVPN
          neighbor {{ loopback_base }}.{{ hostvars[spine].id }} remote-as {{ hostvars[spine].asn }}
          {% endfor %}
        parents: router bgp {{ asn }}

    - name: Activate leaf EVPN neighbors
      eos_config:
        lines:
          - neighbor EVPN activate
        parents:
          - router bgp {{ asn }}
          - address-family evpn

    # -------------------
    # VLANs / VXLAN
    # -------------------
    - name: Configure VLANs
      eos_config:
        lines: |
          {% for vlan in vlans %}
          vlan {{ vlan.id }}
          {% endfor %}

    - name: Configure VXLAN interface
      eos_config:
        lines:
          - vxlan source-interface Loopback0
          - vxlan udp-port 4789
        parents: interface Vxlan1

    - name: Map VNIs
      eos_config:
        lines: |
          {% for vlan in vlans %}
          vxlan vlan {{ vlan.id }} vni {{ vlan.vni }}
          {% endfor %}
        parents: interface Vxlan1

    - name: Enable EVPN VLANs
      eos_config:
        lines: |
          {% for vlan in vlans %}
          vlan {{ vlan.id }}
            rd auto
            route-target both auto
          {% endfor %}
        parents: router bgp {{ asn }}


# =========================
# SPINE CONFIGURATION
# =========================
- name: Configure spines (VXLAN EVPN)
  hosts: spines
  gather_facts: no

  vars:
    loopback: "{{ loopback_base }}.{{ id }}"

  tasks:

    - name: Enable routing
      eos_config:
        lines:
          - service routing protocols model multi-agent
          - ip routing

    - name: Configure Loopback
      eos_config:
        lines:
          - ip address {{ loopback }}/32
        parents: interface Loopback0

    # -------------------
    # Underlay Interfaces (Link Map)
    # -------------------
    - name: Configure spine underlay interfaces
      eos_config:
        lines: |
          {% for link in links if link.spine == inventory_hostname %}
          interface {{ link.spine_intf }}
            description {{ link.spine }}-to-{{ link.leaf }}
            no switchport
            ip address {{ link.spine_ip }}
          {% endfor %}

    # -------------------
    # Underlay BGP
    # -------------------
    - name: Configure BGP underlay for spines
      eos_config:
        lines: |
          no bgp default ipv4-unicast
          {% for link in links if link.spine == inventory_hostname %}
          neighbor {{ link.leaf_ip.split('/')[0] }} remote-as {{ hostvars[link.leaf].asn }}
          {% endfor %}
          network {{ loopback }}/32
        parents: router bgp {{ asn }}

    - name: Activate spine underlay neighbors for IPv4
      eos_config:
        lines: |
          {% for link in links if link.spine == inventory_hostname %}
          neighbor {{ link.leaf_ip.split('/')[0] }} activate
          {% endfor %}
        parents:
          - router bgp {{ asn }}
          - address-family ipv4

    # -------------------
    # EVPN Overlay
    # -------------------
    - name: Configure EVPN base
      eos_config:
        lines:
          - router-id {{ loopback }}
        parents: router bgp {{ asn }}

    - name: Ensure EVPN address-family exists on spines
      eos_config:
        lines: []
        parents:
          - router bgp {{ asn }}
          - address-family evpn

    - name: Configure EVPN neighbors (spines -> leafs only)
      eos_config:
        lines: |
          neighbor EVPN peer group
          neighbor EVPN update-source Loopback0
          neighbor EVPN ebgp-multihop 3
          neighbor EVPN send-community extended
          {% for leaf in groups['leafs'] %}
          neighbor {{ loopback_base }}.{{ hostvars[leaf].id }} peer group EVPN
          neighbor {{ loopback_base }}.{{ hostvars[leaf].id }} remote-as {{ hostvars[leaf].asn }}
          {% endfor %}
        parents: router bgp {{ asn }}

    - name: Activate spine EVPN neighbors
      eos_config:
        lines:
          - neighbor EVPN activate
        parents:
          - router bgp {{ asn }}
          - address-family evpn
